<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate AI Study Planner PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #2a5298;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #1e3c72;
}

.task {
  background: #eee;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.done {
  text-decoration: line-through;
  color: gray;
}

.dashboard {
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
  gap: 10px;
}

.card {
  background: #2a5298;
  color: white;
  padding: 10px;
  border-radius: 10px;
  width: 33%;
  text-align: center;
}

.high { border-left: 6px solid red; }
.medium { border-left: 6px solid orange; }
.low { border-left: 6px solid green; }

.delete-btn {
  width: auto;
  padding: 5px 10px;
  background: red;
  color: white;
  border-radius: 5px;
}

#timer {
  font-size: 30px;
  text-align: center;
  margin: 10px 0;
}
</style>
</head>

<body>

<header>
<h1>🚀 Ultimate AI Study Planner PRO</h1>
<p>Smart • Clean • Powerful</p>
</header>

<div class="container">

<h3>🔐 Login</h3>
<input type="text" id="username" placeholder="Enter username">
<button type="button" onclick="login()">Login</button>

<div id="app" style="display:none">

<h3>📊 Dashboard</h3>
<div class="dashboard">
  <div class="card" id="total">Total: 0</div>
  <div class="card" id="done">Done: 0</div>
  <div class="card" id="pending">Pending: 0</div>
</div>

<h3>🧠 AI Planner</h3>
<input type="text" id="goal" placeholder="Example: Learn Python in 30 days">
<button type="button" onclick="generatePlan()">Generate Plan</button>

<h3>➕ Add Task</h3>
<input type="text" id="taskInput" placeholder="Task">
<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<button type="button" onclick="addTask()">Add Task</button>

<h3>📋 Tasks</h3>
<div id="taskList"></div>

<h3>⏳ Pomodoro Timer</h3>
<div id="timer">25:00</div>
<button type="button" onclick="startTimer()">Start</button>
<button type="button" onclick="resetTimer()">Reset</button>

</div>
</div>

<script>

// ✅ USER BASED SYSTEM
let currentUser = "";
let tasks = [];

// LOGIN
function login(){
  const user = document.getElementById('username').value.trim();

  if(user){
    currentUser = user;

    // load user specific tasks
    tasks = JSON.parse(localStorage.getItem(currentUser)) || [];

    document.getElementById('app').style.display = 'block';

    render();
  }
}

// SAVE
function save(){
  localStorage.setItem(currentUser, JSON.stringify(tasks));
}

// RENDER
function render(){
  const list = document.getElementById('taskList');
  list.innerHTML = '';

  let doneCount = 0;

  tasks.forEach((t,i)=>{

    if(t.done) doneCount++;

    const div = document.createElement('div');
    div.className = `task ${t.priority}`;

    div.innerHTML = `
      <span class="${t.done?'done':''}" onclick="toggle(${i})">
        ${t.text} (${t.priority})
      </span>
      <button class="delete-btn" onclick="del(${i})">❌</button>
    `;

    list.appendChild(div);
  });

  document.getElementById('total').innerText = 'Total: '+tasks.length;
  document.getElementById('done').innerText = 'Done: '+doneCount;
  document.getElementById('pending').innerText = 'Pending: '+(tasks.length-doneCount);
}

// ADD TASK
function addTask(){
  const text = document.getElementById('taskInput').value.trim();
  const priority = document.getElementById('priority').value;

  if(!text) return;

  tasks.push({text, priority, done:false});

  document.getElementById('taskInput').value = '';

  save();
  render();
}

// DELETE
function del(i){
  tasks.splice(i,1);
  save();
  render();
}

// TOGGLE
function toggle(i){
  tasks[i].done = !tasks[i].done;
  save();
  render();
}

// AI PLAN
function generatePlan(){
  const goal = document.getElementById('goal').value;
  if(!goal) return;

  tasks.push({text:`📘 Basics of ${goal}`, priority:'medium', done:false});
  tasks.push({text:`📝 Practice ${goal}`, priority:'high', done:false});
  tasks.push({text:`🔁 Revision of ${goal}`, priority:'low', done:false});

  save();
  render();
}

// TIMER
let time = 1500;
let interval;

function startTimer(){
  clearInterval(interval);

  interval = setInterval(()=>{
    let min = Math.floor(time/60);
    let sec = time%60;

    document.getElementById('timer').innerText =
      `${min}:${sec<10?'0':''}${sec}`;

    time--;

    if(time < 0){
      clearInterval(interval);
      alert("⏰ Time's up!");
      time = 1500;
    }

  },1000);
}

function resetTimer(){
  clearInterval(interval);
  time = 1500;
  document.getElementById('timer').innerText = "25:00";
}

</script>

</body>
</html>
